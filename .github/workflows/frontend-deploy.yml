name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    name: Build & Deploy React/Vite to Azure Static Web Apps
    runs-on: ubuntu-latest
    # Skip deploy on closed PRs (Azure handles cleanup automatically)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js 20 + npm cache ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ─── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # ─── Build with production env vars from GitHub Secrets ───────────────────
      # These override the values in .env.production at build time
      - name: Build production bundle
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ─── Deploy to Azure Static Web Apps ─────────────────────────────────────
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'          # Root of the frontend app
          output_location: 'dist'           # Vite build output directory
          skip_app_build: true              # We already built above

  # ─── Cleanup PR preview environments ────────────────────────────────────────
  close-pull-request:
    name: Close Pull Request Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
