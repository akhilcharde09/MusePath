# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - musepath

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'          # Fixed: project uses Java 17, not 21
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests --no-transfer-progress
        working-directory: backend    # Fixed: pom.xml is in backend/, not root

      - name: Rename JAR to app.jar
        run: |
          JAR=$(find backend/target -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          echo "Building JAR: $JAR"
          cp "$JAR" backend/target/app.jar

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/target/app.jar  # Fixed: JAR is in backend/target/, not root/target/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5B355BED3CC14265A37A3739928428D7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_34132751FAE84E41A3A3917241564DD2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9BA437ABCF9148EA92883B1D17AA6DA9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'musepath'
          slot-name: 'Production'
          package: '*.jar'