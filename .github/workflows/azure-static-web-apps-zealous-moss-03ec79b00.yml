name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_MOSS_03EC79B00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"   # React app root
          api_location: ""             # No Azure Functions API
          output_location: "dist"      # FIXED: Vite builds to dist/, NOT build/
        env:
          # Inject production environment variables at build time
          VITE_API_URL: https://musepath-a7bpc8fsb0b6d2dz.eastus2-01.azurewebsites.net
          VITE_SUPABASE_URL: https://tdfqwobzkfwxrsllyhfy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZnF3b2J6a2Z3eHJzbGx5aGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTkzODQsImV4cCI6MjA5NTk5NTM4NH0.LoXr1GT6PmbZoQELF0PVJYbBgLoAQZaMLRUYzkfXTM8

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_MOSS_03EC79B00 }}
          action: "close"
