name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Spring Boot to Azure
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Java 17 + Maven cache ───────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─── Build fat JAR ───────────────────────────────────────────────────────
      - name: Build fat JAR (skip tests)
        run: mvn package -DskipTests --no-transfer-progress
        working-directory: backend

      # ─── Rename JAR to app.jar ───────────────────────────────────────────────
      - name: Rename JAR to app.jar
        run: |
          JAR=$(find backend/target -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          echo "Found JAR: $JAR"
          cp "$JAR" backend/target/app.jar

      # ─── Login to Azure via Service Principal ────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─── Deploy to Azure App Service ─────────────────────────────────────────
      - name: Deploy JAR to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: musepath-api        # ← must match your Azure App Service name exactly
          package: backend/target/app.jar

      # ─── Logout ──────────────────────────────────────────────────────────────
      - name: Logout from Azure
        run: az logout
        if: always()

      # ─── Health Check ─────────────────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting 40s for app to boot..."
          sleep 40
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://musepath-api.azurewebsites.net/health || echo "000")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is live and healthy!"
          else
            echo "⚠️ Got $STATUS — app may still be warming up. Check Azure Log Stream."
          fi
