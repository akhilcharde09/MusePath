# MusePath API — Spring Boot Configuration
# Azure App Service injects PORT=8080 automatically via WEBSITES_PORT.
# Locally, set PORT=3001 in your shell or run-backend.ps1.
server.port=${PORT:8080}

# Increase server timeout for long-running Gemini plan generation (3 min)
server.tomcat.connection-timeout=200000
spring.mvc.async.request-timeout=200000

# Disable Spring Boot banner in logs (cleaner Azure log stream)
spring.main.banner-mode=off

# Disable JPA/DataSource auto-config (we use Supabase REST API, not JPA)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Supabase REST API (no DB password needed!)
supabase.url=${SUPABASE_URL:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}

# External API Keys
gemini.api-key=${GEMINI_API_KEY:}
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
youtube.api-key=${YOUTUBE_API_KEY:}

# Async thread pool for Spotify enrichment background tasks
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# Logging
logging.level.com.musepath=INFO
logging.level.org.springframework.web=WARN
